<html lang="en">

    <title>Tempo — Music Driven Racer</title>
    <meta name="description" content="Tempo — a music driven racer. Every track is built from the song you pick." />

      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background: #060a12;

        box-sizing: border-box;

      body {
        margin: 0;

          radial-gradient(circle at 50% 85%, rgba(129, 255, 192, 0.1), transparent 30%),
          linear-gradient(180deg, #09111d 0%, #05080f 100%);

      #app {
        width: 100vw;
        height: 100vh;
      }

    <div id="app"></div>
    <script type="module" src="/src/client/main.ts"></script>
